<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 Tally Remote Data Fetcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: linear-gradient(45deg, #6c757d, #495057);
        }

        .btn-success {
            background: linear-gradient(45deg, #28a745, #20c997);
        }

        .results {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-height: 400px;
            overflow-y: auto;
        }

        .results h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .success {
            color: #155724;
            background: #d4edda;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }

        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #495057;
        }

        .data-table tr:hover {
            background: #f8f9fa;
        }

        .json-output {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-connected {
            background: #28a745;
        }

        .status-disconnected {
            background: #dc3545;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌐 Tally Remote Data Fetcher</h1>
            <p>Connect to any Tally Prime installation and fetch data remotely</p>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>🔗 Connection Settings</h2>
                
                <div class="form-group">
                    <label for="tallyUrl">Tally Server URL</label>
                    <input type="text" id="tallyUrl" placeholder="host.docker.internal:9000" value="host.docker.internal:9000">
                </div>

                <div class="form-group">
                    <label for="requestType">Request Type</label>
                    <select id="requestType">
                        <option value="TrialBalance">Trial Balance (Complete Financial Data)</option>
                        <option value="LedgerBalance">Ledger Balance (Basic Balances)</option>
                        <option value="ListOfLedgers">List of Ledgers (Names Only)</option>
                        <option value="LedgerDetails">Ledger Details (All Fields)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ledgerName">Ledger Name (Optional)</label>
                    <input type="text" id="ledgerName" placeholder="e.g., Alfa Provisions">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="fromDate">From Date (Optional)</label>
                        <input type="date" id="fromDate">
                    </div>
                    <div class="form-group">
                        <label for="toDate">To Date (Optional)</label>
                        <input type="date" id="toDate">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                    <button class="btn" onclick="testConnection()">🔗 Test Connection</button>
                    <button class="btn btn-success" onclick="fetchData()">📊 Fetch Data</button>
                </div>
            </div>

            <div class="card">
                <h2>📊 Results</h2>
                <div id="results">
                    <div class="loading">Configure connection settings and click "Fetch Data" to begin...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let connectionStatus = false;

        async function testConnection() {
            const tallyUrl = document.getElementById('tallyUrl').value;
            
            if (!tallyUrl) {
                showError('Please enter Tally server URL');
                return;
            }

            showLoading('Testing connection...');
            
            try {
                const response = await fetch('/api/test-connection', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ tallyUrl })
                });

                const result = await response.json();
                
                if (result.success && result.connected) {
                    connectionStatus = true;
                    showSuccess(`✅ Connected to Tally successfully! Response time: ${result.responseTime}ms`);
                    updateConnectionStatus(true);
                } else {
                    connectionStatus = false;
                    showError(`❌ Failed to connect: ${result.error}`);
                    updateConnectionStatus(false);
                }
            } catch (error) {
                connectionStatus = false;
                showError(`❌ Connection test failed: ${error.message}`);
                updateConnectionStatus(false);
            }
        }

        async function fetchData() {
            if (!connectionStatus) {
                showError('Please test connection first before fetching data');
                return;
            }

            const tallyUrl = document.getElementById('tallyUrl').value;
            const requestType = document.getElementById('requestType').value;
            const ledgerName = document.getElementById('ledgerName').value;
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;

            if (!tallyUrl) {
                showError('Please enter Tally server URL');
                return;
            }

            showLoading('Fetching data from Tally...');

            try {
                const response = await fetch('/api/fetch-tally-data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        tallyUrl,
                        requestType,
                        ledgerName: ledgerName || undefined,
                        from: fromDate || undefined,
                        to: toDate || undefined
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    showSuccess(`✅ Successfully fetched data! Found ${result.data.length} items.`);
                    displayResults(result);
                } else {
                    showError(`❌ Failed to fetch data: ${result.error}`);
                    if (result.details) {
                        showError(`Details: ${result.details}`);
                    }
                }
            } catch (error) {
                showError(`❌ Request failed: ${error.message}`);
            }
        }

        function showLoading(message) {
            document.getElementById('results').innerHTML = `<div class="loading">${message}</div>`;
        }

        function showError(message) {
            document.getElementById('results').innerHTML = `<div class="error">${message}</div>`;
        }

        function showSuccess(message) {
            document.getElementById('results').innerHTML = `<div class="success">${message}</div>`;
        }

        function displayResults(result) {
            let html = `
                <h3>📊 Fetched Data (${result.data.length} items)</h3>
                <div style="margin-bottom: 15px;">
                    <strong>Tally URL:</strong> ${result.meta.tallyUrl}<br>
                    <strong>Request Type:</strong> ${result.meta.requestType}<br>
                    <strong>Processing Time:</strong> ${result.meta.processingTime}ms<br>
                    <strong>Timestamp:</strong> ${new Date(result.meta.timestamp).toLocaleString()}
                </div>
            `;

            if (result.data && result.data.length > 0) {
                html += '<table class="data-table"><thead><tr>';
                
                // Get all possible keys from first item
                const keys = Object.keys(result.data[0]);
                keys.forEach(key => {
                    html += `<th>${key}</th>`;
                });
                
                html += '</tr></thead><tbody>';
                
                result.data.forEach(item => {
                    html += '<tr>';
                    keys.forEach(key => {
                        const value = item[key] !== null ? item[key] : 'N/A';
                        html += `<td>${value}</td>`;
                    });
                    html += '</tr>';
                });
                
                html += '</tbody></table>';
            } else {
                html += '<p>No data found for the specified criteria.</p>';
            }

            html += `
                <h3>🔧 Raw JSON Response</h3>
                <div class="json-output">${JSON.stringify(result, null, 2)}</div>
            `;

            document.getElementById('results').innerHTML = html;
        }

        function updateConnectionStatus(connected) {
            const urlInput = document.getElementById('tallyUrl');
            if (connected) {
                urlInput.style.borderColor = '#28a745';
                urlInput.style.boxShadow = '0 0 0 3px rgba(40, 167, 69, 0.1)';
            } else {
                urlInput.style.borderColor = '#dc3545';
                urlInput.style.boxShadow = '0 0 0 3px rgba(220, 53, 69, 0.1)';
            }
        }

        // Auto-fill today's dates
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            
            document.getElementById('fromDate').valueAsDate = firstDay;
            document.getElementById('toDate').valueAsDate = today;
        });
    </script>
</body>
</html>
