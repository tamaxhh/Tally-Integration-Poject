<!DOCTYPE html>
<html>
<head>
  <title>Tally Integration Status</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
    .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
    .healthy { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    #tally-status { font-weight: bold; }
  </style>
</head>
<body>
  <h1>Tally Integration API Status</h1>
  
  <div id="api-status" class="status">Checking API...</div>
  
  <button onclick="checkTally()">Check Tally Connection</button>
  <div id="tally-status" class="status">Not checked</div>
  
  <script>
    async function checkHealth() {
      try {
        const res = await fetch('http://localhost:3000/health');
        const data = await res.json();
        document.getElementById('api-status').innerHTML = `API Status: ${data.status}`;
        document.getElementById('api-status').className = 'status healthy';
      } catch (err) {
        document.getElementById('api-status').innerHTML = `API Error: ${err.message}`;
        document.getElementById('api-status').className = 'status error';
      }
    }
    
    async function checkTally() {
      try {
        // Stub: add /api/v1/health/tally endpoint later for real connection test
        document.getElementById('tally-status').innerHTML = 'Tally: Connected (stub - implement /health/tally)';
        document.getElementById('tally-status').className = 'status healthy';
      } catch (err) {
        document.getElementById('tally-status').innerHTML = `Tally Error: ${err.message}`;
        document.getElementById('tally-status').className = 'status error';
      }
    }
    
    checkHealth();
    setInterval(checkHealth, 5000);
  </script>
</body>
</html>
